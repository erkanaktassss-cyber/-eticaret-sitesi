<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaShop | Ürünler</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-wrap">
        <a href="../index.html" class="brand">NovaShop</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menü">☰</button>
        <nav class="nav-links" id="nav-links">
          <a data-nav-link href="../index.html">Ana Sayfa</a>
          <a data-nav-link href="product.html">Ürünler</a>
          <a data-nav-link href="cart.html">Sepet <span class="badge" data-cart-count>0</span></a>
          <a data-nav-link href="login.html">Giriş</a>
          <a data-nav-link href="about.html">Hakkımızda</a>
          <a data-nav-link href="contact.html">İletişim</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <h1>Ürün Kataloğu</h1>
          <p>Kategori, arama ve sıralama seçenekleri ile size en uygun ürünü hızlıca bulun.</p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="controls">
            <input id="product-search" class="input" type="text" placeholder="Ürün ara..." />
            <select id="category-filter"></select>
            <select id="sort-products">
              <option value="default">Sıralama</option>
              <option value="price-asc">Fiyat (Artan)</option>
              <option value="price-desc">Fiyat (Azalan)</option>
              <option value="rating">Puan (Yüksek)</option>
            </select>
          </div>

          <div class="grid grid-4" id="products-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container small" style="padding: 20px 0">© <span data-current-year></span> NovaShop</div>
    </footer>

    <script src="../assets/js/products.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
