<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim | NovaShop</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="../index.html">Nova<span>Shop</span></a>
      <button class="menu-toggle" aria-label="Menüyü aç">☰</button>
      <nav class="nav-links">
        <a href="../index.html">Ana Sayfa</a>
        <a href="product.html">Ürünler</a>
        <a href="cart.html">Sepet</a>
        <a href="about.html">Hakkımızda</a>
        <a href="contact.html" class="active">İletişim</a>
        <a href="login.html" class="btn btn-sm">Giriş</a>
      </nav>
    </div>
  </header>

  <main class="container section auth-wrap">
    <form class="card auth-form" id="contactForm">
      <h1>Bizimle İletişime Geçin</h1>
      <label>Ad Soyad</label>
      <input class="input" required placeholder="Adınız" />
      <label>E-posta</label>
      <input class="input" type="email" required placeholder="mail@ornek.com" />
      <label>Mesajınız</label>
      <textarea class="input" rows="5" required placeholder="Mesajınızı yazın..."></textarea>
      <button class="btn" type="submit">Gönder</button>
    </form>
  </main>

  <footer class="site-footer"><div class="container">© 2026 NovaShop</div></footer>
  <script src="../assets/js/main.js"></script>
</body>
</html>
