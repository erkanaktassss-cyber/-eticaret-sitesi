<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaShop | Giriş Yap</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-wrap">
        <a href="../index.html" class="brand">NovaShop</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menü">☰</button>
        <nav class="nav-links" id="nav-links">
          <a data-nav-link href="../index.html">Ana Sayfa</a>
          <a data-nav-link href="product.html">Ürünler</a>
          <a data-nav-link href="cart.html">Sepet <span class="badge" data-cart-count>0</span></a>
          <a data-nav-link href="login.html">Giriş</a>
          <a data-nav-link href="about.html">Hakkımızda</a>
          <a data-nav-link href="contact.html">İletişim</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <h1>Giriş Yap</h1>
          <p>Demo kullanıcı girişi ile hesabınıza hızlıca erişin.</p>
        </div>
      </section>

      <section class="section">
        <div class="container" style="max-width: 520px">
          <article class="card form-card">
            <form id="login-form" class="form-grid">
              <label for="login-email">E-posta</label>
              <input class="input" id="login-email" type="email" required placeholder="ornek@mail.com" />

              <label for="login-password">Şifre</label>
              <input class="input" id="login-password" type="password" required minlength="6" placeholder="******" />

              <button class="btn btn-primary" type="submit">Giriş Yap</button>
            </form>
            <p id="login-message" class="small"></p>
            <div class="notice">Not: Bu sayfa demo amaçlıdır, gerçek kimlik doğrulama yapılmaz.</div>
          </article>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container small" style="padding: 20px 0">© <span data-current-year></span> NovaShop</div>
    </footer>

    <script src="../assets/js/products.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
